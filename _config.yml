title: Chroma Ad-Blocker
description: Premium YouTube Ad-Blocker for Manifest V3. Bypass detections with style.
remote_theme: jekyll/minima

# Minima configuration
minima:
  skin: dark # Start with dark skin if available, but we'll override

# Navigation
header_pages:
  - index.md
  - PRIVACY_POLICY.md
  - ToS.md
  - LICENSE.md

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-remote-theme

# Assets
include:
  - icons
  - assets
