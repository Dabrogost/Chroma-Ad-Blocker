title: Chroma Ad-Blocker
description: >-
  Multi-layered ad blocking built for Manifest V3. Block ads, accelerate
  them away, and protect your privacy — all locally on your device.
url: "https://dabrogost.github.io"
baseurl: "/YT-Chroma"
repository: Dabrogost/YT-Chroma

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

permalink: pretty

exclude:
  - node_modules/
  - package.json
  - package-lock.json
  - README.md
  - extension/
  - Gemfile
  - Gemfile.lock
  - "*.crx"
  - "*.pem"

defaults:
  - scope:
      path: ""
    values:
      layout: default
