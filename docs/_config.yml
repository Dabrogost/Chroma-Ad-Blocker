title: Chroma Ad-Blocker
description: >-
  Multi-layered ad blocking built for Manifest V3. Block ads, accelerate
  them away, and protect your privacy — all locally on your device.
url: "https://dabrogost.github.io"
baseurl: "/Chroma-Ad-Blocker"
repository: Dabrogost/Chroma-Ad-Blocker

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

permalink: pretty

exclude:
  - Gemfile
  - Gemfile.lock
  - subscriptions/

defaults:
  - scope:
      path: ""
    values:
      layout: default
