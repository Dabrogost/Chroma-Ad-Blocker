<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT Shield</title>
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2e2e2e;
      --accent: #ff0000;
      --accent-dim: #cc0000;
      --text: #f1f1f1;
      --text-dim: #aaaaaa;
      --green: #2ecc71;
      --radius: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .logo {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }

    .title-group h1 {
      font-size: 14px; font-weight: 600; letter-spacing: 0.3px;
    }
    .title-group span {
      font-size: 11px; color: var(--text-dim);
    }

    .status-dot {
      margin-left: auto;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      flex-shrink: 0;
    }

    /* ── STATS ── */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--border);
      border-bottom: 1px solid var(--border);
    }

    .stat-card {
      background: var(--surface);
      padding: 12px 16px;
      text-align: center;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 3px;
    }

    .stat-label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── TOGGLES ── */
    .section-title {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 12px 16px 6px;
    }

    .toggle-row {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      gap: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .toggle-row:hover { background: var(--surface); }

    .toggle-info { flex: 1; }
    .toggle-info .name { font-size: 13px; font-weight: 500; }
    .toggle-info .desc { font-size: 11px; color: var(--text-dim); margin-top: 1px; }

    /* Toggle switch */
    .switch {
      position: relative;
      width: 36px; height: 20px;
      flex-shrink: 0;
    }

    .switch input { opacity: 0; width: 0; height: 0; }

    .slider {
      position: absolute;
      inset: 0;
      background: #444;
      border-radius: 20px;
      transition: background 0.2s;
      cursor: pointer;
    }

    .slider::before {
      content: '';
      position: absolute;
      height: 14px; width: 14px;
      left: 3px; bottom: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    input:checked + .slider { background: var(--accent); }
    input:checked + .slider::before { transform: translateX(16px); }

    /* ── DIVIDER ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 4px 0;
    }

    /* ── FOOTER ── */
    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      border-top: 1px solid var(--border);
    }

    .reset-btn {
      font-size: 11px;
      color: var(--text-dim);
      background: none;
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .reset-btn:hover { color: var(--text); border-color: #555; }

    .version { font-size: 11px; color: var(--text-dim); }

    /* ── BADGE (active indicator) ── */
    .badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      font-weight: 600;
      background: rgba(46, 204, 113, 0.15);
      color: var(--green);
      margin-left: 6px;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">🛡</div>
    <div class="title-group">
      <h1>YT Shield</h1>
      <span>YouTube Ad Blocker</span>
    </div>
    <div class="status-dot" id="statusDot" title="Active"></div>
  </header>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-value" id="statAccelerated">0</div>
      <div class="stat-label">Ads Accelerated</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statBlocked">0</div>
      <div class="stat-label">Elements Hidden</div>
    </div>
  </div>

  <div class="section-title">Protection Layers</div>

  <div class="toggle-row">
    <div class="toggle-info">
      <div class="name">Ad Acceleration <span class="badge">Primary</span></div>
      <div class="desc">Mute + 16× speed — bypasses detection</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="toggleAcceleration" />
      <span class="slider"></span>
    </label>
  </div>

  <div class="toggle-row">
    <div class="toggle-info">
      <div class="name">Cosmetic Filtering</div>
      <div class="desc">Hides banners, sponsored slots, overlays</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="toggleCosmetic" />
      <span class="slider"></span>
    </label>
  </div>

  <div class="toggle-row">
    <div class="toggle-info">
      <div class="name">Warning Suppression</div>
      <div class="desc">Removes "ad blocker detected" dialogs</div>
    </div>
    <label class="switch">
      <input type="checkbox" id="toggleWarnings" />
      <span class="slider"></span>
    </label>
  </div>

  <div class="divider"></div>

  <footer>
    <button class="reset-btn" id="resetStats">Reset Stats</button>
    <span class="version">v1.0.0 · MV3</span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
