name: Test

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Node tests
        run: npm test

      - name: Validate DNR rules
        run: npm run test:rules

      - name: Locate Chromium or Chrome
        id: browser
        shell: bash
        run: |
          set -euo pipefail
          browser="$(command -v chromium || command -v chromium-browser || command -v google-chrome || command -v google-chrome-stable || true)"
          if [ -z "$browser" ]; then
            echo "No Chromium/Chrome binary found; skipping E2E."
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Using browser: $browser"
          echo "available=true" >> "$GITHUB_OUTPUT"
          echo "CHROME_BIN=$browser" >> "$GITHUB_ENV"
          echo "CHROME_PATH=$browser" >> "$GITHUB_ENV"

      - name: Run browser E2E
        if: steps.browser.outputs.available == 'true'
        run: npm run test:e2e

      - name: Package extension
        run: npm run package:extension
